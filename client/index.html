
<!DOCTYPE html>
<html lang="bs">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Klix</title>
        <link rel="icon" type="image/png" href="/public/image.png">
        <meta name="author" content="Malik">
        <link rel="stylesheet" href="style.css">
    </head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <body>
        <div class ="header">
            <div class="header-container"> 
                <div class="srchbar">
                    <button class="icon-btn" aria-label="pretraži-tekst">
                        <i data-lucide="text-search"></i>
                    </button>
                </div>
                <div class="logo">
                    <img class="logo-img" src="/public/scitech_transparent.png" alt="Klix SciYech">
                </div>
                <nav class="nav">
                    <a href="#" class="nav-item"><span class="dot" style="background: #e11d48;"></span>Vijesti</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #f97316;"></span>Biznis</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #22c55e;"></span>Sport</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #a855f7;"></span>Magazin</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #eab308;"></span>Lifestyle</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #06b6d4;"></span>Scitech</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #3b82f6;"></span>Auto</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #6b7280;"></span>Križaljka</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #ec4899;"></span>Posao</a>
                    <a href="#" class="nav-item"><span class="dot" style="background: #ef4444;"></span>Video</a>
                </nav>
                <div class="header-actions">
                    <button class="icon-btn">
                        <i data-lucide="pen-line"></i>
                    </button>
                    <button class="icon-btn">
                        <i data-lucide="user"></i>
                    </button>
                </div>
            </div>
        </div>
        <script>
            lucide.createIcons();
        </script>
        <script src="script.js"></script>
    </body>
    
</html>
